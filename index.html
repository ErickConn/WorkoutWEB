<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./menu.css">
    <title>Workout App</title>
</head>
<body>
    <h1>Dados Biometricos</h1>
    <form>
        <div>
            <label> Peso atual(kg)</label>
            <input type="number" step="0.1" min="0">
        </div>
        <div>
            <label> Altura (cm)</label>
            <input type="number" step="0.1" min="0">
        </div>
        <div>
            <label> Idade</label>
            <input type="number" min="0">
        </div>
        <div>
            <label> Nivel de Atividade </label>
            <select>
                <option>Moderado(3-5x/semana)</option>
                <option>Sedentario(0x/semana)</option>
                <option>Ativo(6-7x/semana)</option>
            </select>
        </div>
        <div>
            <label> Objetivo </label>
            <select>
                <option>Hipertrofia</option>
                <option>Emagrecimento</option>
                <option>Manutencao</option>
            </select>
        </div>
    </form>
    <div>
        <h2>Meta calculada</h2>
        <span>TMB(Taxa metabolica basal) 1,845</span>
        <p>Meta Diária 2,300 kcal</p>
        <span>Distribuição de Macros</span>
        <p>175g Proteínas</p>
        <span>233g Carboidratos</span>
        <p>66g Gorduras</p>
    </div>
    <button type="submit"> Gerar meu plano</button>

    <h1>Workout App</h1>
</body>
 <footer>
        <div class="menu-navegacao">
            <a class="botao-navegacao">
                🧎‍♀️
                <p class="atual">Perfil</p>
            </a>

            </a>
            <a class="botao-navegacao">
                📈
                <p>Progresso</p>
            </a>
        </div>
    </footer>
<script src="./index.js"></script> 
</html>
